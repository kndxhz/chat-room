<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #333;
            /* 关键渲染样式内联避免FOUC */
            display: block !important;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lightbox {
            width: 80%;
            height: 80%;
        }

        .chat-container {
            width: 100vw;
            max-width: none;
            height: 100vh;
            background: transparent;
            backdrop-filter: none;
            border-radius: 0;
            box-shadow: none;
            display: block;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .chat-main {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            display: none;
        }

        .chat-messages {
            flex: 1;
            padding: 120px 24px 160px 24px;
            overflow-y: auto;
            color: #333;
            max-width: 100%;
            font-size: 1.1em;
            /* 增大字体，提高可读性 */
            background: rgba(255, 255, 255, 0.24);
        }

        .chat-messages p {
            margin: 5px 0;
        }

        .chat-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 24px;
            z-index: 3;
        }

        .chat-input-row {
            position: relative;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input input,
        .chat-input textarea {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.7);
            /* 增强背景对比度 */
        }

        .chat-input textarea {
            width: auto;
            min-height: 44px;
            max-height: 160px;
            resize: none;
        }

        .chat-input input[type="file"] {
            flex: 1;
            min-width: 0;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 5px;
            padding: 8px;
        }

        .chat-input button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .chat-input button:hover {
            background: #0056b3;
        }

        .reply-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(0, 123, 255, 0.12);
            border-left: 3px solid #007bff;
            color: #0f172a;
            font-size: 0.92em;
        }

        .reply-bar.open {
            display: flex;
        }

        .reply-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .reply-cancel-btn {
            flex: none;
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.75);
            color: #334155;
            cursor: pointer;
        }

        .reply-cancel-btn:hover {
            background: rgba(255, 255, 255, 0.95);
        }

        .mention-alert-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(245, 158, 11, 0.16);
            border-left: 3px solid #f59e0b;
            color: #7c2d12;
            font-size: 0.92em;
        }

        .mention-alert-bar.open {
            display: flex;
        }

        .mention-alert-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mention-close-btn {
            flex: none;
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.75);
            color: #7c2d12;
            cursor: pointer;
        }

        .mention-picker {
            display: none;
            margin-top: 4px;
            max-height: 180px;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            padding: 8px;
            gap: 8px;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .mention-picker.open {
            display: flex;
        }

        .mention-option {
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(0, 123, 255, 0.22);
            background: rgba(0, 123, 255, 0.08);
            border-radius: 999px;
            text-align: left;
            padding: 6px 10px;
            font-size: 0.9em;
            color: #0f172a;
            cursor: pointer;
            max-width: 100%;
            white-space: nowrap;
        }

        .mention-option:hover {
            background: rgba(0, 123, 255, 0.18);
            border-color: rgba(0, 123, 255, 0.38);
        }

        .file-list {
            flex: none;
            padding: 14px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            overflow-y: auto;
            position: absolute;
            top: 24px;
            right: 24px;
            width: 280px;
            max-height: calc(100vh - 200px);
            z-index: 3;
        }

        .file-list h3 {
            text-align: center;
            color: #333;
        }

        .file-list a {
            display: block;
            margin: 5px 0;
            color: #007bff;
            text-decoration: none;
        }

        .file-list a:hover {
            text-decoration: underline;
        }

        .instructions {
            flex: none;
            padding: 14px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            overflow-y: auto;
            position: absolute;
            top: 24px;
            left: 24px;
            width: 280px;
            max-height: calc(100vh - 200px);
            z-index: 3;
        }

        .instructions h3 {
            text-align: center;
            color: #333;
        }

        .instructions p {
            margin: 10px 0;
            color: #333;
        }

        .background-info-box {
            margin: 0 0 10px 0;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.35);
            font-size: 0.92em;
            color: #222;
            line-height: 1.45;
            white-space: pre-wrap;
        }

        .message-content {
            margin: 5px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            word-wrap: break-word;
            /* 自动换行 */
            word-break: break-word;
            /* 支持长单词换行 */
            overflow-wrap: break-word;
            /* 兼容性 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            display: inline-block;
            width: fit-content;
            max-width: min(78vw, 900px);
        }

        .message-container {
            width: 100%;
            display: flex;
            justify-content: flex-start;
        }

        .message-content.sent {
            background: rgba(0, 123, 255, 0.1);
            border-left: 3px solid #007bff;
            margin-left: 0;
            border-radius: 0 10px 10px 10px;
        }

        .message-content.received {
            background: rgba(255, 255, 255, 0.5);
            border-left: 3px solid #333;
            margin-left: 0;
            border-radius: 0 10px 10px 10px;
        }

        .message-content pre {
            position: relative;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            white-space: -moz-pre-wrap;
            white-space: -pre-wrap;
            white-space: -o-pre-wrap;
            word-wrap: break-word;
        }

        .message-content.sent {
            background: rgba(0, 123, 255, 0.1);
            border-left: 3px solid #007bff;
            text-align: left;
        }

        .message-content.received {
            background: rgba(255, 255, 255, 0.5);
            border-left: 3px solid #333;
            text-align: left;
        }

        .copy-button {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 3px 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .copy-button:hover {
            opacity: 1;
        }


        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .message-content blockquote {
            border-left: 4px solid #ddd;
            margin: 0;
            padding-left: 1em;
            color: #666;
        }

        #messageInput {
            min-height: 44px;
            max-height: 160px;
            width: auto;
            resize: none;
            line-height: 1.5;
            padding: 10px;
            overflow-y: auto !important;
            white-space: pre-wrap;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .code-block-wrapper {
            position: relative;
            margin: 10px 0;
            text-align: left;
        }

        .code-block-wrapper .copy-button {
            top: 8px;
            right: 8px;
            z-index: 1;
        }

        .hljs {
            background: #f5f5f5 !important;
            padding: 1em !important;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            body {
                overflow: hidden;
                font-size: 14px;
            }

            .instructions,
            .file-list {
                width: calc(50vw - 20px);
                max-height: 28vh;
                top: 12px;
                left: auto;
                right: 60px;
                border-radius: 12px;
                padding: 10px;
            }

            .file-list {
                right: 12px;
            }

            .chat-messages {
                padding: 96px 12px 170px 12px;
                font-size: 1em;
            }

            .chat-input {
                left: 12px;
                right: 12px;
                bottom: 12px;
                padding: 10px;
            }

            .chat-input-row {
                gap: 8px;
            }

            .chat-input button {
                padding: 10px 12px;
            }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                align-items: flex-start;
                height: auto;
                overflow: auto;
                font-size: 14px;
                /* 减小基础字体 */
            }

            .chat-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
                /* 垂直布局 */
            }

            .chat-main {
                flex: none;
                width: 100%;
                height: auto;
            }

            .chat-messages {
                height: 50vh;
                padding: 10px;
                font-size: 1em;
                /* 调整字体大小 */
            }

            .chat-input {
                padding: 5px;
            }

            .chat-input-row {
                position: relative;
            }

            .chat-input input,
            .chat-input textarea {
                margin-bottom: 10px;
                width: 100%;
                /* 全宽显示 */
                font-size: 1em;
            }

            .chat-input button {
                width: 100%;
                /* 全宽按钮 */
                font-size: 1em;
            }



            .file-list {
                width: 100%;
                height: auto;
                padding: 10px;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.2);
            }

            .file-list h3 {
                font-size: 1.2em;
            }

            .file-list a {
                font-size: 0.9em;
            }

            .message-content {
                padding: 8px;
                font-size: 0.9em;
                max-width: 92vw;
            }

            #messageInput {
                font-size: 0.9em;
            }

            .input-hint {
                font-size: 0.7em;
            }
        }

        /* 电脑端优化 */
        @media (min-width: 769px) {
            .chat-container {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            }

            .chat-header {
                background: rgba(255, 255, 255, 0.4);
            }

            .chat-messages {
                background: rgba(255, 255, 255, 0.5);
            }

            .message-content {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }

            .chat-input button {
                background: linear-gradient(135deg, #007bff, #0056b3);
            }

            .chat-input button:hover {
                background: linear-gradient(135deg, #0056b3, #003d80);
            }
        }

        .floating-icon-button {
            position: absolute;
            top: 18px;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
            color: #1f2937;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .floating-icon-button:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.32);
        }

        .floating-icon-button:active {
            transform: scale(0.96);
        }

        .floating-icon-button.instructions-toggle {
            right: 72px;
        }

        .floating-icon-button.files-toggle {
            right: 18px;
        }

        .scroll-to-bottom-btn {
            position: absolute;
            right: 34px;
            bottom: 190px;
            z-index: 7;
            border: none;
            border-radius: 999px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.58);
            color: #fff;
            font-size: 0.92em;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.24);
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .scroll-to-bottom-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .floating-panel {
            display: none;
        }

        .floating-panel.open {
            display: block;
        }

        .instructions,
        .file-list {
            width: 300px;
            max-width: calc(100vw - 32px);
            top: 72px;
            max-height: calc(100vh - 110px);
        }

        .instructions {
            right: 72px;
            left: auto;
        }

        .file-list {
            right: 18px;
        }

        .chat-messages {
            padding: 24px 24px 148px 24px;
        }

        .chat-input {
            left: 24px;
            right: 24px;
            bottom: 18px;
        }

        #bg-holder {
            background-size: cover !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
        }

        @media (max-width: 768px) {
            .floating-icon-button {
                top: 12px;
                width: 42px;
                height: 42px;
                font-size: 1.05rem;
            }

            .scroll-to-bottom-btn {
                right: 18px;
                bottom: 168px;
                padding: 7px 10px;
                font-size: 0.86em;
            }

            .floating-icon-button.instructions-toggle {
                right: 60px;
            }

            .floating-icon-button.files-toggle {
                right: 12px;
            }

            .instructions,
            .file-list {
                width: calc(50vw - 14px);
                top: 62px;
                max-height: calc(100vh - 188px);
            }

            .instructions {
                right: 60px;
                left: auto;
            }

            .file-list {
                right: 12px;
            }

            .chat-messages {
                padding: 20px 12px 156px 12px;
            }

            .chat-input-row {
                gap: 8px;
            }

            .chat-input input,
            .chat-input textarea {
                width: auto;
                margin-bottom: 0;
                font-size: 1em;
            }

            .chat-input button {
                width: auto;
                font-size: 1em;
            }

            .chat-input input[type="file"] {
                flex: 1;
                min-width: 0;
            }
        }

        /* 超小屏兜底：避免宽度过小时 UI 挤没 */
        @media (max-width: 560px) {
            .chat-messages {
                padding: 72px 8px 0 8px;
                background: rgba(255, 255, 255, 0.3) !important;
            }

            .scroll-to-bottom-btn {
                right: 12px;
                bottom: 162px;
                padding: 6px 9px;
                font-size: 0.82em;
            }

            .chat-input {
                left: 8px !important;
                right: 8px !important;
                bottom: 8px !important;
                padding: 8px !important;
                border-radius: 12px;
            }

            .chat-input-row {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }

            .chat-input input,
            .chat-input textarea,
            .chat-input button {
                width: 100% !important;
                margin: 0 !important;
            }

            .floating-icon-button {
                width: 38px;
                height: 38px;
                top: 8px;
                font-size: 0.95rem;
            }

            .floating-icon-button.files-toggle {
                right: 8px;
            }

            .floating-icon-button.instructions-toggle {
                right: 50px;
            }

            .instructions,
            .file-list {
                width: calc(100vw - 16px) !important;
                max-width: calc(100vw - 16px) !important;
                left: 8px !important;
                right: 8px !important;
                top: 52px !important;
                max-height: 38vh !important;
                padding: 8px;
                border-radius: 12px;
            }
        }

        @media (max-width: 768px) {
            body {
                height: 100vh !important;
                overflow: hidden !important;
            }

            .chat-container {
                width: 100vw !important;
                height: 100vh !important;
                overflow: hidden !important;
                display: block !important;
            }

            .chat-main {
                position: absolute !important;
                inset: 0 !important;
                display: flex !important;
                flex-direction: column !important;
                min-height: 0 !important;
            }

            .chat-messages {
                flex: 1 1 auto !important;
                min-height: 0 !important;
                height: auto !important;
                overflow-y: auto !important;
            }
        }
    </style>

<body>
    <div class="chat-container">
        <button type="button" class="floating-icon-button instructions-toggle"
            onclick="togglePanel('instructionsPanel')" aria-label="展开指令提示">ℹ️</button>
        <button type="button" class="floating-icon-button files-toggle" onclick="togglePanel('fileList')"
            aria-label="展开文件列表">📁</button>
        <div class="instructions floating-panel" id="instructionsPanel">
            <div class="background-info-box" id="backgroundInfoText">图片信息加载中...</div>
            <h3>指令说明</h3>
            <p><strong>/set-name 名字</strong> 重新设定昵称</p>
            <p><strong>/clear</strong> 清空聊天记录</p>
            <p><strong>/list</strong> 列出所有在线设备</p>
            <p><strong>/del 文件名</strong> 删除某个文件</p>
            <p><strong>/del-all-files</strong> 删除全部文件</p>
            <p><strong>/update-dns</strong> 更新dns记录</p>
            <p><strong>包含4缩进或编程语言关键词的文本</strong> 自动解析代码块</p>
            <p><strong>任何Markdown</strong> 解析为对应样式</p>
        </div>
        <div class="chat-main">
            <div class="chat-header">聊天室</div>
            <div class="chat-messages" id="messages"></div>
            <button type="button" id="scrollToBottomBtn" class="scroll-to-bottom-btn"
                onclick="handleScrollToBottomClick()" aria-label="回到底部">⬇ 回到底部</button>
            <div class="chat-input">
                <div class="mention-alert-bar" id="mentionAlertBar">
                    <span class="mention-alert-text" id="mentionAlertText"></span>
                    <button type="button" class="mention-close-btn" onclick="hideMentionAlert()">知道了</button>
                </div>
                <div class="reply-bar" id="replyBar">
                    <span class="reply-text" id="replyText"></span>

    <script>
        let ws;
        let username;
        let history;
        let shouldAutoFollow = true;
        let unreadCount = 0;
        let replyContext = null;
        let onlineUsers = [];
        let historyReplayDone = false;
        const SYSTEM_PREFIX = "[SYSTEM]";
        const SYSTEM_ALERT_PREFIX = "[SYSTEM:ALERT]";
        const SYSTEM_USERS_PREFIX = "[SYSTEM:USERS]";

        function formatReplyPreview(text, maxLength = 40) {
            const compact = (text || "")
                .replace(/\s+/g, " ")
                .replace(/^\s+|\s+$/g, "");
            if (!compact) {
                return "[空消息]";
            }
            return compact.length > maxLength ? `${compact.slice(0, maxLength)}...` : compact;
        }

        function parseReplyTarget(rawMessage) {
            const source = (rawMessage || "").toString();
            const firstColon = source.indexOf("：");
            if (firstColon > 0) {
                return {
                    sender: source.slice(0, firstColon),
                    content: source.slice(firstColon + 1)
                };
            }
            return {
                sender: "消息",
                content: source
            };
        }

        function escapeRegExp(text) {
            return (text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function isMentioningCurrentUser(rawMessage) {
            if (!username) {
                return false;
            }
            const { sender, content } = parseReplyTarget(rawMessage);
            if (!content || !sender || sender === "消息" || sender === username) {
                return false;
            }

            const escapedUsername = escapeRegExp(username);
            const mentionPattern = new RegExp(`(^|[\\s\\u3000,，.。!！?？:：;；、\\(\\[\\{<"'“”‘’])@${escapedUsername}(?=$|[\\s\\u3000,，.。!！?？:：;；、\\)\\]\\}>"'“”‘’])`);
            return mentionPattern.test(content);
        }

        function renderMentionTip(rawMessage) {
            const { sender } = parseReplyTarget(rawMessage);
            if (!sender || sender === "消息") {
                return;
            }
            const mentionAlertBar = document.getElementById("mentionAlertBar");
            const mentionAlertText = document.getElementById("mentionAlertText");
            if (!mentionAlertBar || !mentionAlertText) {
                return;
            }
            mentionAlertText.textContent = `${sender}@了你`;
            mentionAlertBar.classList.add("open");
            scheduleSyncMessageBottomSpacing();
        }

        function isReplyingCurrentUser(rawMessage) {
            if (!username) {
                return false;
            }
            const { sender, content } = parseReplyTarget(rawMessage);
            if (!content || !sender || sender === "消息" || sender === username) {
                return false;
            }

            const escapedUsername = escapeRegExp(username);
            const replyPattern = new RegExp(`(^|\\n)\\s*>\\s*回复\\s+${escapedUsername}：`);
            return replyPattern.test(content);
        }

        function renderReplyTip(rawMessage) {
            const { sender } = parseReplyTarget(rawMessage);
            if (!sender || sender === "消息") {
                return;
            }
            const mentionAlertBar = document.getElementById("mentionAlertBar");
            const mentionAlertText = document.getElementById("mentionAlertText");
            if (!mentionAlertBar || !mentionAlertText) {
                return;
            }
            mentionAlertText.textContent = `${sender}回复了你`;
            mentionAlertBar.classList.add("open");
            scheduleSyncMessageBottomSpacing();
        }

        function hideMentionAlert() {
            const mentionAlertBar = document.getElementById("mentionAlertBar");
            if (mentionAlertBar) {
                mentionAlertBar.classList.remove("open");
            }
            scheduleSyncMessageBottomSpacing();
        }

        function updateOnlineUsersFromPayload(payloadText) {
            try {
                const parsed = JSON.parse(payloadText || "{}");
                if (!Array.isArray(parsed.users)) {
                    return;
                }
                onlineUsers = parsed.users.filter((name) => typeof name === "string");
                renderMentionPicker();
            } catch (error) {
                console.warn("在线用户列表解析失败", error);
            }
        }

        function getMentionState() {
            const messageInput = document.getElementById("messageInput");
            if (!messageInput) {
                return null;
            }
            const caretIndex = messageInput.selectionStart ?? messageInput.value.length;
            const beforeCaret = messageInput.value.slice(0, caretIndex);
            const match = beforeCaret.match(/(^|\s)@([^\s@]*)$/);
            if (!match) {
                return null;
            }
            const keyword = match[2] || "";
            const tokenStart = beforeCaret.length - match[0].length + match[1].length;
            return {
                keyword,
                tokenStart,
                caretIndex,
            };
        }

        function renderMentionPicker() {
            const picker = document.getElementById("mentionPicker");
            const state = getMentionState();
            if (!picker || !state) {
                if (picker) {
                    picker.classList.remove("open");
                    picker.innerHTML = "";
                }
                return;
            }

            const keyword = state.keyword.toLowerCase();
            const candidates = onlineUsers
                .filter((name) => name && name !== username)
                .filter((name) => !keyword || name.toLowerCase().includes(keyword))
                .slice(0, 10);

            if (!candidates.length) {
                picker.classList.remove("open");
                picker.innerHTML = "";
                return;
            }

            picker.innerHTML = candidates
                .map((name) => `<button type="button" class="mention-option" data-name="${name.replace(/"/g, '&quot;')}">@${name}</button>`)
                .join("");
            picker.classList.add("open");

            picker.querySelectorAll(".mention-option").forEach((button) => {
                button.addEventListener("click", () => {
                    applyMention(button.dataset.name || "");
                });
            });
        }

        function applyMention(name) {
            const messageInput = document.getElementById("messageInput");
            const picker = document.getElementById("mentionPicker");
            const state = getMentionState();
            if (!messageInput || !state || !name) {
                return;
            }

            const before = messageInput.value.slice(0, state.tokenStart);
            const after = messageInput.value.slice(state.caretIndex);
            const mentionText = `@${name} `;
            messageInput.value = `${before}${mentionText}${after}`;
            const newCaret = (before + mentionText).length;
            messageInput.focus();
            messageInput.setSelectionRange(newCaret, newCaret);
            autoResize(messageInput);
            if (picker) {
                picker.classList.remove("open");
                picker.innerHTML = "";
            }
        }

        function setReplyContextFromMessage(rawMessage, messageType) {
            if (messageType === "system") {
                return;
            }
            const { sender, content } = parseReplyTarget(rawMessage);
            replyContext = {
                sender: sender || "消息",
                preview: formatReplyPreview(content)
            };
            const replyBar = document.getElementById("replyBar");
            const replyText = document.getElementById("replyText");
            if (replyBar && replyText) {
                replyText.textContent = `回复 ${replyContext.sender}：${replyContext.preview}`;
                replyBar.classList.add("open");
            }

            const messageInput = document.getElementById("messageInput");
            if (messageInput) {
                messageInput.focus();
            }
            scheduleSyncMessageBottomSpacing();
        }

        function clearReplyContext() {
            replyContext = null;
            const replyBar = document.getElementById("replyBar");
            if (replyBar) {
                replyBar.classList.remove("open");
            }
            scheduleSyncMessageBottomSpacing();
        }

        function isNearBottom(element, threshold = 90) {
            if (!element) {
                return true;
            }
            const distanceToBottom = element.scrollHeight - element.scrollTop - element.clientHeight;
            return distanceToBottom <= threshold;
        }

        function updateScrollToBottomButton() {
            const btn = document.getElementById("scrollToBottomBtn");
            const messagesDiv = document.getElementById("messages");
            if (!btn || !messagesDiv) {
                return;
            }

            const shouldShow = !shouldAutoFollow && !isNearBottom(messagesDiv);
            btn.classList.toggle("visible", shouldShow);
            btn.textContent = unreadCount > 0 ? `⬇ ${unreadCount}条新消息` : "⬇ 回到底部";
        }

        function handleScrollToBottomClick() {
            shouldAutoFollow = true;
            unreadCount = 0;
            scrollMessagesToBottom(true);
            updateScrollToBottomButton();
        }

        function scrollMessagesToBottom(force = false) {
            const messagesDiv = document.getElementById("messages");
            if (!messagesDiv) {
                return;
            }
            if (force || shouldAutoFollow) {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                if (isNearBottom(messagesDiv)) {
                    unreadCount = 0;
                }
            }
            updateScrollToBottomButton();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            const newHeight = Math.min(textarea.scrollHeight, 150);
            textarea.style.height = newHeight + 'px';
            scheduleSyncMessageBottomSpacing();
        }

        function syncMessageBottomSpacing() {
            const messages = document.getElementById('messages');
            const chatInput = document.querySelector('.chat-input');
            if (!messages || !chatInput) {
                return;
            }

            const inputHeight = Math.ceil(chatInput.getBoundingClientRect().height || 0);
            const safeGap = window.matchMedia('(max-width: 560px)').matches ? 28 : 18;

            const currentPaddingTop =
                window.getComputedStyle(messages).paddingTop || '0px';

            messages.style.setProperty('padding-top', currentPaddingTop, 'important');
            messages.style.setProperty('padding-bottom', `${inputHeight + safeGap}px`, 'important');
        }

        function scheduleSyncMessageBottomSpacing() {
            requestAnimationFrame(() => {
                syncMessageBottomSpacing();
                requestAnimationFrame(() => {
                    syncMessageBottomSpacing();
                });
            });
        }

        // 初始化输入框事件
        const messageInput = document.getElementById('messageInput');

        // 输入时自动调整高度
        messageInput.addEventListener('input', () => {
            autoResize(messageInput);
            renderMentionPicker();
        });

        messageInput.addEventListener('click', () => {
            renderMentionPicker();
        });

        window.addEventListener('resize', () => {
            scheduleSyncMessageBottomSpacing();
        });

        window.addEventListener('orientationchange', () => {
            scheduleSyncMessageBottomSpacing();
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                scheduleSyncMessageBottomSpacing();
            });
        }

        // 修正后的marked配置
        marked.setOptions({
            breaks: false,
            highlight: function (code, lang) {
                // 自动检测语言
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';

                try {
                    return hljs.highlight(code, {
                        language,
                        ignoreIllegals: true
                    }).value;
                } catch (e) {
                    return hljs.highlight(code, {
                        language: 'plaintext',
                        ignoreIllegals: true
                    }).value;
                }
            },
            langPrefix: 'hljs language-'
        });

        // 创建自定义渲染器
        const renderer = new marked.Renderer();

        // 自定义图片渲染方法
        renderer.image = function (href, title, text) {
            // Lightbox 需要每个图片被包裹在 <a> 标签中，并带有 data-lightbox 属性
            return `
                <a href="${href}" data-lightbox="image" data-title="${title || ''}">
                    <img src="${href}" alt="${text || ''}">
                </a>
            `;
        };

        // 设置其他自定义渲染方法（如代码块）
        renderer.code = function (code, infostring, escaped) {
            const lang = (infostring || '').match(/\S*/)[0];
            return `
                <div class="code-block-wrapper">
                    <pre><code class="hljs ${lang}">${code}</code></pre>
                </div>
            `;
        };

        // 应用自定义渲染器
        marked.setOptions({ renderer });


        // 设置 cookie
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            const cookieString = `${name}=${encodeURIComponent(value)};expires=${date.toUTCString()};path=/`;
            console.log("设置cookie:", cookieString); // 调试日志
            document.cookie = cookieString;
            if (name === "username") {
                localStorage.setItem("username", value);
            }
        }

        // 获取 cookie
        function getCookie(name) {
            const cookies = document.cookie.split("; ");
            for (let cookie of cookies) {
                const [key, value] = cookie.split("=");
                if (key === name) {
                    return decodeURIComponent(value || "");
                }
            }
            if (name === "username") {
                const storedUsername = localStorage.getItem("username");
                if (storedUsername) {
                    return storedUsername;
                }
            }
            return null;
        }

        // 删除 cookie
        function deleteCookie(name) {
            document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
            if (name === "username") {
                localStorage.removeItem("username");
            }
        }

        function connectWebSocket() {
            ws = new WebSocket("ws://im.kndxhz.cn:8765");

            ws.onopen = () => {
                console.log("已连接到 WebSocket 服务器");
                ws.send(`/set-name ${username}`);
            };

            ws.onmessage = (event) => {
                const message = event.data;
                if (typeof message === "string" && message.startsWith(SYSTEM_ALERT_PREFIX)) {
                    alert(message.slice(SYSTEM_ALERT_PREFIX.length));
                    deleteCookie("username");
                    location.reload();
                    return;
                }
                if (typeof message === "string" && message.startsWith(SYSTEM_PREFIX)) {
                    const systemMessage = message.slice(SYSTEM_PREFIX.length);
                    if (systemMessage === "----以上是历史记录----") {
                        historyReplayDone = true;
                    }
                    renderMessage(systemMessage, "system");

            function sendNotification(message) {
                if (Notification.permission === "granted") {

                    Notification.requestPermission().then(permission => {

                    ws.onopen = () => {

                        if (username) {

                    ws.onclose = () => {

                        if (typeof message === "string" && message.startsWith(SYSTEM_PREFIX)) {
                            const systemMessage = message.slice(SYSTEM_PREFIX.length);
                            if (systemMessage === "----以上是历史记录----") {
                                historyReplayDone = true;
                            }
                            renderMessage(systemMessage, "system");
                            return;
                        }
                        if (typeof message === "string" && message.startsWith(SYSTEM_USERS_PREFIX)) {
                            updateOnlineUsersFromPayload(message.slice(SYSTEM_USERS_PREFIX.length));
                            return;
                        }
                        if (historyReplayDone && isMentioningCurrentUser(message)) {
                            renderMentionTip(message);
                        } else if (historyReplayDone && isReplyingCurrentUser(message)) {
                            renderReplyTip(message);
                        }
                        renderMessage(message, "received");
                    };
                };

                tryReconnect();
            }
        }


        function sendMessage() {
            const messageInput = document.getElementById("messageInput");
            const message = messageInput.value.trim();

            if (message) {
                // 保留换行格式（替换为\n）
                let formattedMessage = message;

                // 检查是否包含代码块
                if (message.includes("```")) {
                    formattedMessage = message;
                } else {
                    // 检查是否是代码格式（以4个空格开头或包含特定关键字）
                    let check_message = message.toLowerCase();
                    let keywords = ["if", "for", "while", "def", "class", "return", "print", "import", "sqlite3", "tkinter", "select"];
                    if (/^ {4}|(\n {4})/m.test(check_message) || keywords.some(keyword => check_message.includes(keyword))) {
                        formattedMessage = "```\n" + message + "\n```";
                    }
                }

                // 检查是否是 "/set-name xxx" 指令
                if (message.startsWith("/set-name ")) {
                    const newUsername = message.substring(10)
                    if (newUsername) {
                        username = newUsername; // 更新本地变量
                        if (username.includes(" ")) {
                            alert("昵称包含空格，请重新输入！");
                            deleteCookie("username"); // 清空 cookie
                            location.reload(); // 刷新页面重新输入昵称
                            return;
                        }
                        setCookie("username", username, 1); // 更新 cookie
                        console.log(`昵称已更新为：${newUsername}`);
                        ws.send(message);
                    }
                } else if (message !== "/clear") {
                    // 组合用户名和消息内容
                    let messageWithUsername = `${formattedMessage}`;
                    if (replyContext) {
                        const replyLine = `> 回复 ${replyContext.sender}：${replyContext.preview}`;
                        messageWithUsername = `${replyLine}\n\n${formattedMessage}`;
                    }
                    ws.send(messageWithUsername);
                    renderMessage(`${username}：` + messageWithUsername, "sent", message);
                    clearReplyContext();
                }

                messageInput.value = '';

                // 触发input事件以重置高度
                const event = new Event('input');
                messageInput.dispatchEvent(event);
                syncMessageBottomSpacing();
            }

            // 检查是否是 "/clear" 指令
            if (message === "/clear") {
                const chatMessages = document.getElementById("messages");
                chatMessages.innerHTML = "";
            }
            const messagesDiv = document.getElementById("messages");
            scheduleSyncMessageBottomSpacing();
            if (messagesDiv) {
                shouldAutoFollow = isNearBottom(messagesDiv);
            }
            scrollMessagesToBottom(true);
        }

        function renderMessage(message, type, originalMessage = "") {
            const messagesDiv = document.getElementById("messages");
            const container = document.createElement("div");
            const rawMessageForReply = message;
            message = message.replace("<", "&lt;").replace(">", "&gt;");
            originalMessage = originalMessage.replace("<", "&lt;").replace(">", "&gt;");
            container.className = "message-container";
            history = originalMessage;
            if (type !== "system" && (message.includes("kick") || message.includes("ban") || message.includes("unban"))) {
                return
            }

            if (type === "received" && username && message.startsWith(`${username}：`)) {
                type = "sent";
            }

            const shouldStickToBottom = type !== "received" || shouldAutoFollow || isNearBottom(messagesDiv);

            // 预处理消息内容（添加安全过滤）
            const sanitizedMessage = DOMPurify.sanitize(message
                .replace(/```(\s*\n*)/g, '```\n')
                .replace(/(\n*)```/g, '\n```')
            );

            const messageElement = document.createElement("div");
            messageElement.className = "message-content";

            // 启用 marked 的 breaks 选项
            marked.setOptions({
                breaks: true // 保留换行符
            });

            try {
                // 使用同步解析方法
                messageElement.innerHTML = marked.parse(sanitizedMessage);
            } catch (e) {
                console.error('Markdown解析错误:', e);
                messageElement.textContent = sanitizedMessage;
            }

            // 添加代码块功能
            messageElement.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
                const pre = block.parentElement;
                pre.style.position = 'relative';

                const copyButton = document.createElement('button');
                copyButton.className = "copy-button";
                copyButton.innerHTML = "📋";
                copyButton.onclick = () => {
                    try {


                        navigator.clipboard.writeText(block.textContent)
                            .then(() => {
                                copyButton.innerHTML = "✓";
                                setTimeout(() => copyButton.innerHTML = "📋", 1500);
                            });
                    }
                    catch (e) {
                        const textArea = document.createElement('textarea')
                        textArea.value = block.textContent
                        // 使text area不在viewport，同时设置不可见
                        document.body.appendChild(textArea)
                        textArea.focus()
                        textArea.select()
                        document.execCommand('copy')
                        textArea.remove()

                        copyButton.innerHTML = "✓";
                        setTimeout(() => copyButton.innerHTML = "📋", 1500);


                    }
                };
                pre.appendChild(copyButton);
            });

            // 样式设置
            messageElement.classList.add(type);
            messageElement.style.background = type === "sent"
                ? "rgba(0, 123, 255, 0.1)"
                : type === "system"
                    ? "rgba(255, 193, 7, 0.14)"
                    : "rgba(255, 255, 255, 0.5)";
            if (type !== "system") {
                messageElement.title = "右键回复此消息";
                messageElement.addEventListener('contextmenu', (event) => {
                    event.preventDefault();
                    setReplyContextFromMessage(rawMessageForReply, type);
                });
            }
            if (type === "system") {
                messageElement.style.borderLeft = "3px solid #f59e0b";
            }
            messageElement.querySelectorAll('pre').forEach(pre => {
                pre.style.whiteSpace = 'pre-wrap';
                pre.style.backgroundColor = 'rgba(0, 0, 0, 0.05)';
            });

            container.appendChild(messageElement);
            messagesDiv.appendChild(container);

            scheduleSyncMessageBottomSpacing();
            if (shouldStickToBottom) {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                unreadCount = 0;
            } else if (type === "received") {
                unreadCount += 1;
            }
            updateScrollToBottomButton();


        }


        function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            if (!file) {
                alert("请选择一个文件！");
                return;
            }
            uploadDroppedFile(file);
        }

        function uploadDroppedFile(file) {
            if (!file) {
                alert("未检测到文件！");
                return;
            }

            let name = file.name.replace(/ /g, "");
            let file_extensions = name.slice(-3).toLowerCase(); // 转为小写统一判断

            if (file.name === "image.png") {
                let time = Date.now();
                let newName = `${time}.${file_extensions}`;

                // 创建新的 File 对象
                file = new File([file], newName, { type: file.type });
                name = newName;

            }



            const formData = new FormData();
            formData.append("file", file);

            fetch(`http://im.kndxhz.cn:5000/upload?is_img=${file_extensions === 'jpg' || file_extensions === 'png' || file_extensions === 'gif' ? 1 : 0}`, {
                method: "POST",
                body: formData,
            })
                .then(response => response.json())
                .then(data => {

                    if (file_extensions === "jpg" || file_extensions === "png" || file_extensions === "gif") {

                        let downloadUrl = `http://im.kndxhz.cn/img/${name}`;
                        let message = `![img](${downloadUrl})`;
                        ws.send(message);
                        renderMessage(`${username}：${message}`, "sent", `${username}：${message}`);
                    } else {
                        let downloadUrl = `http://im.kndxhz.cn:5000/download/${name}`;
                        let message = `发送了文件 ([${name}](${downloadUrl}))`;
                        ws.send(message);
                        renderMessage(`${username}：${message}`, "sent", `${username}：${message}`);
                    }

                    alert(data.message || "文件上传成功！");
                    fetchFileList(); // 更新文件列表
                })
                .catch(error => {
                    console.error("文件上传失败：", error);
                    alert("文件上传失败！");
                });
        }

        function fetchFileList() {
            fetch("http://im.kndxhz.cn:5000/file_list")
                .then(response => response.json()) // 解析为 JSON
                .then(files => {
                    const fileListDiv = document.getElementById("fileList");
                    fileListDiv.innerHTML = "<h3>文件列表</h3>";
                    files.forEach(file => {
                        const fileLink = document.createElement("a");
                        fileLink.href = `http://im.kndxhz.cn:5000/download/${file}`;
                        fileLink.textContent = file;
                        fileLink.target = "_blank";
                        fileListDiv.appendChild(fileLink);
                    });
                })
                .catch(error => {
                    console.error("获取文件列表失败：", error);
                });
        }

    </script>
