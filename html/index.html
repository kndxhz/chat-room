<!doctype html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天室</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #333;
      display: block !important;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .message-content {
      margin: 5px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      word-wrap: break-word;
      word-break: break-word;
    }

    .message-content img {
      display: block;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      cursor: zoom-in;
    }

    .chat-container {
      position: relative;
      z-index: 1;
    }

    .viewer-zoom-indicator {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 10001;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.02em;
      user-select: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      backdrop-filter: blur(8px);
    }

    .viewer-zoom-indicator.visible {
      opacity: 1;
    }

    .message-content pre {
      position: relative;
      margin: 10px 0;
      padding: 0;
      border-radius: 5px;
      overflow-x: auto;
      white-space: pre;
      word-break: normal;
      background: transparent;
    }

    .message-content.sent {
      background: rgba(0, 123, 255, 0.1);
      border-left: 3px solid #007bff;
      text-align: left;
    }

    .message-content.received {
      background: rgba(255, 255, 255, 0.5);
      border-left: 3px solid #333;
      text-align: left;
    }

    .copy-button {
      position: absolute;
      top: 5px;
      right: 5px;
      padding: 3px 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .copy-button:hover {
      opacity: 1;
    }

    .message-content :not(pre)>code {
      background: rgba(0, 0, 0, 0.1);
      padding: 2px 4px;
      border-radius: 3px;
    }

    .message-content pre code {
      display: block;
      padding: 1em;
      border-radius: 5px;
      background: #1e1e1e;
      color: #d4d4d4;
      white-space: inherit;
    }

    .message-content blockquote {
      border-left: 4px solid #ddd;
      margin: 0;
      padding-left: 1em;
      color: #666;
    }

    .reply-meta-line {
      margin: 0 0 8px 0;
      padding: 6px 8px;
      border-left: 3px solid #60a5fa;
      background: rgba(96, 165, 250, 0.12);
      border-radius: 6px;
      color: #1e3a8a;
      font-size: 0.92em;
      word-break: break-word;
    }

    .message-jump-highlight {
      outline: 2px solid rgba(245, 158, 11, 0.9);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.22);
      transition: box-shadow 0.2s ease;
    }

    #messageInput {
      min-height: 44px;
      max-height: 160px;
      width: auto;
      resize: none;
      line-height: 1.5;
      padding: 10px;
      overflow-y: auto !important;
      white-space: pre-wrap;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .code-block-wrapper {
      position: relative;
      margin: 10px 0;
      text-align: left;
    }

    .code-block-wrapper .copy-button {
      top: 8px;
      right: 8px;
      z-index: 1;
    }

    .hljs {
      background: #1e1e1e !important;
      padding: 1em !important;
      border-radius: 5px;
    }

    @media (max-width: 768px) {
      body {
        overflow: hidden;
        font-size: 14px;
      }

      .instructions,
      .file-list {
        width: calc(50vw - 20px);
        max-height: 28vh;
        top: 12px;
        left: auto;
        right: 60px;
        border-radius: 12px;
        padding: 10px;
      }

      .file-list {
        right: 12px;
      }

      .chat-messages {
        padding: 96px 12px 170px 12px;
        font-size: 1em;
      }

      .chat-input {
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 10px;
      }

      .chat-input-row {
        gap: 8px;
      }

      .chat-input button {
        padding: 10px 12px;
      }
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      body {
        justify-content: flex-start;
        align-items: flex-start;
        height: auto;
        overflow: auto;
        font-size: 14px;
        /* 减小基础字体 */
      }

      .chat-container {
        width: 100%;
        height: 100%;
        border-radius: 0;
        box-shadow: none;
        flex-direction: column;
        /* 垂直布局 */
      }

      .chat-main {
        flex: none;
        width: 100%;
        height: auto;
      }

      .chat-messages {
        height: 50vh;
        padding: 10px;
        font-size: 1em;
        /* 调整字体大小 */
      }

      .chat-input {
        padding: 5px;
      }

      .chat-input-row {
        position: relative;
      }

      .chat-input input,
      .chat-input textarea {
        margin-bottom: 10px;
        width: 100%;
        /* 全宽显示 */
        font-size: 1em;
      }

      .chat-input button {
        width: 100%;
        /* 全宽按钮 */
        font-size: 1em;
      }

      .file-list {
        width: 100%;
        height: auto;
        padding: 10px;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .file-list h3 {
        font-size: 1.2em;
      }

      .file-list a {
        font-size: 0.9em;
      }

      .message-content {
        padding: 8px;
        font-size: 0.9em;
        max-width: 92vw;
      }

      #messageInput {
        font-size: 0.9em;
      }

      .input-hint {
        font-size: 0.7em;
      }
    }

    /* 电脑端优化 */
    @media (min-width: 769px) {
      .chat-container {
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      }

      .chat-header {
        background: rgba(255, 255, 255, 0.4);
      }

      .chat-messages {
        background: rgba(255, 255, 255, 0.5);
      }

      .message-content {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .chat-input button {
        background: linear-gradient(135deg, #007bff, #0056b3);
      }

      .chat-input button:hover {
        background: linear-gradient(135deg, #0056b3, #003d80);
      }
    }

    .floating-icon-button {
      position: absolute;
      top: 18px;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      color: #1f2937;
      font-size: 1.2rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .floating-icon-button:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.32);
    }

    .floating-icon-button:active {
      transform: scale(0.96);
    }

    .floating-icon-button.instructions-toggle {
      right: 72px;
    }

    .floating-icon-button.files-toggle {
      right: 18px;
    }

    .scroll-to-bottom-btn {
      position: absolute;
      right: 34px;
      bottom: 190px;
      z-index: 7;
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      font-size: 0.92em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition:
        opacity 0.2s ease,
        transform 0.2s ease;
    }

    .scroll-to-bottom-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .floating-panel {
      display: none;
    }

    .floating-panel.open {
      display: block;
    }

    .instructions,
    .file-list {
      width: 300px;
      max-width: calc(100vw - 32px);
      top: 72px;
      max-height: calc(100vh - 110px);
    }

    .instructions {
      right: 72px;
      left: auto;
    }

    .file-list {
      right: 18px;
    }

    .chat-messages {
      padding: 24px 24px 148px 24px;
    }

    .chat-input {
      left: 24px;
      right: 24px;
      bottom: 18px;
    }

    #bg-holder {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
    }

    @media (max-width: 768px) {
      .chat-messages {
        background: rgba(255, 255, 255, 0.4) !important;
      }

      .chat-input,
      .instructions,
      .file-list,
      .floating-icon-button {
        background: rgba(255, 255, 255, 0.3) !important;
        border-color: rgba(255, 255, 255, 0.36) !important;
      }

      .floating-icon-button {
        top: 12px;
        width: 42px;
        height: 42px;
        font-size: 1.05rem;
      }

      .scroll-to-bottom-btn {
        right: 18px;
        bottom: 168px;
        padding: 7px 10px;
        font-size: 0.86em;
      }

      .floating-icon-button.instructions-toggle {
        right: 60px;
      }

      .floating-icon-button.files-toggle {
        right: 12px;
      }

      .instructions,
      .file-list {
        width: calc(50vw - 14px);
        top: 62px;
        max-height: calc(100vh - 188px);
      }

      .instructions {
        right: 60px;
        left: auto;
      }

      .file-list {
        right: 12px;
      }

      .chat-messages {
        padding: 20px 12px 156px 12px;
      }

      .chat-input-row {
        gap: 8px;
      }

      .chat-input input,
      .chat-input textarea {
        width: auto;
        margin-bottom: 0;
        font-size: 1em;
      }

      .chat-input button {
        width: auto;
        font-size: 1em;
      }

      .chat-input input[type="file"] {
        flex: 1;
        min-width: 0;
      }
    }

    /* 超小屏兜底：避免宽度过小时 UI 挤没 */
    @media (max-width: 560px) {
      .chat-messages {
        padding: 72px 8px 0 8px;
        background: rgba(255, 255, 255, 0.52) !important;
      }

      .chat-input,
      .instructions,
      .file-list,
      .floating-icon-button {
        background: rgba(255, 255, 255, 0.42) !important;
      }

      .scroll-to-bottom-btn {
        right: 12px;
        bottom: 162px;
        padding: 6px 9px;
        font-size: 0.82em;
      }

      .chat-input {
        left: 8px !important;
        right: 8px !important;
        bottom: 8px !important;
        padding: 8px !important;
        border-radius: 12px;
      }

      .chat-input-row {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }

      .chat-input input,
      .chat-input textarea,
      .chat-input button {
        width: 100% !important;
        margin: 0 !important;
      }

      .floating-icon-button {
        width: 38px;
        height: 38px;
        top: 8px;
        font-size: 0.95rem;
      }

      .floating-icon-button.files-toggle {
        right: 8px;
      }

      .floating-icon-button.instructions-toggle {
        right: 50px;
      }

      .instructions,
      .file-list {
        width: calc(100vw - 16px) !important;
        max-width: calc(100vw - 16px) !important;
        left: 8px !important;
        right: 8px !important;
        top: 52px !important;
        max-height: 38vh !important;
        padding: 8px;
        border-radius: 12px;
      }
    }

    @media (max-width: 768px) {
      body {
        height: 100vh !important;
        overflow: hidden !important;
      }

      .chat-container {
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        display: block !important;
      }

      .chat-main {
        position: absolute !important;
        inset: 0 !important;
        display: flex !important;
        flex-direction: column !important;
        min-height: 0 !important;
      }

      .chat-messages {
        flex: 1 1 auto !important;
        min-height: 0 !important;
        height: auto !important;
        overflow-y: auto !important;
      }
    }
  </style>

  <style>
    body {
      display: block !important;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .chat-container {
      width: 100vw;
      max-width: none;
      height: 100vh;
      background: transparent;
      backdrop-filter: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .chat-main {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: none;
    }

    .chat-messages {
      flex: 1;
      padding: 24px 24px 160px 24px;
      overflow-y: auto;
      color: #333;
      max-width: 100%;
      font-size: 1.1em;
      background: rgba(255, 255, 255, 0.24);
    }

    .chat-messages p {
      margin: 5px 0;
    }

    .chat-input {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 3;
    }

    .chat-input-row {
      position: relative;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input input,
    .chat-input textarea {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
      font-size: 1em;
      background: rgba(255, 255, 255, 0.7);
    }

    .chat-input textarea {
      width: auto;
      min-height: 44px;
      max-height: 160px;
      resize: none;
    }

    .chat-input input[type="file"] {
      flex: 1;
      min-width: 0;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 5px;
      padding: 8px;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    .chat-input button:hover {
      background: #0056b3;
    }

    .reply-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 123, 255, 0.12);
      border-left: 3px solid #007bff;
      color: #0f172a;
      font-size: 0.92em;
    }

    .reply-bar.open {
      display: flex;
    }

    .reply-text,
    .mention-alert-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reply-cancel-btn,
    .mention-close-btn {
      flex: none;
      padding: 4px 8px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.75);
      cursor: pointer;
    }

    .mention-alert-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(245, 158, 11, 0.16);
      border-left: 3px solid #f59e0b;
      color: #7c2d12;
      font-size: 0.92em;
    }

    .mention-alert-bar.open {
      display: flex;
    }

    .mention-picker {
      display: none;
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: calc(100% + 8px);
      max-height: 56px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      padding: 8px 10px;
      white-space: nowrap;
      z-index: 5;
    }

    .mention-picker.open {
      display: block;
    }

    .mention-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      margin-right: 8px;
      border: 1px solid rgba(15, 23, 42, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #0f172a;
      font-size: 0.92em;
      cursor: pointer;
      white-space: nowrap;
    }

    .mention-option:last-child {
      margin-right: 0;
    }

    .mention-option:hover {
      background: rgba(59, 130, 246, 0.12);
      border-color: rgba(59, 130, 246, 0.45);
      color: #1d4ed8;
    }

    .file-list,
    .instructions {
      flex: none;
      padding: 14px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      overflow-y: auto;
      position: absolute;
      top: 24px;
      width: 280px;
      max-height: calc(100vh - 200px);
      z-index: 3;
    }

    .file-list {
      right: 24px;
    }

    .instructions {
      right: 72px;
      left: auto;
    }

    .background-info-box {
      margin: 0 0 10px 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.35);
      font-size: 0.92em;
      color: #222;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message-container {
      width: 100%;
      display: flex;
      justify-content: flex-start;
    }

    .message-content {
      margin: 5px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      font-size: 1.1em;
      display: inline-block;
      width: fit-content;
      max-width: min(78vw, 900px);
    }

    .message-content.sent {
      background: rgba(0, 123, 255, 0.1);
      border-left: 3px solid #007bff;
      border-radius: 0 10px 10px 10px;
    }

    .message-content.received {
      background: rgba(255, 255, 255, 0.5);
      border-left: 3px solid #333;
      border-radius: 0 10px 10px 10px;
    }

    .message-content pre {
      position: relative;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 1em;
      border-radius: 5px;
      overflow-x: auto;
      white-space: pre-wrap;
      white-space: -moz-pre-wrap;
      white-space: -pre-wrap;
      white-space: -o-pre-wrap;
      word-wrap: break-word;
    }

    .message-content code {
      background: rgba(0, 0, 0, 0.1);
      padding: 2px 4px;
      border-radius: 3px;
    }

    .message-content blockquote {
      border-left: 4px solid #ddd;
      margin: 0;
      padding-left: 1em;
      color: #666;
    }

    #bg-holder {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
    }
  </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>-->
</head>

<body>
  <div class="chat-container">
    <button type="button" class="floating-icon-button instructions-toggle" onclick="togglePanel('instructionsPanel')"
      aria-label="展开指令提示">
      ℹ️
    </button>
    <button type="button" class="floating-icon-button files-toggle" onclick="togglePanel('fileList')"
      aria-label="展开文件列表">
      📁
    </button>
    <div class="instructions floating-panel" id="instructionsPanel">
      <div class="background-info-box" id="backgroundInfoText">
        图片信息加载中...
      </div>
      <h3>指令说明</h3>
      <p><strong>/set-name 名字</strong> 重新设定昵称</p>
      <p><strong>/clear</strong> 清空聊天记录</p>
      <p><strong>/list</strong> 列出所有在线设备</p>
      <p><strong>/del 文件名</strong> 删除某个文件</p>
      <p><strong>/del-all-files</strong> 删除全部文件</p>
      <p><strong>/update-dns</strong> 更新dns记录</p>
      <p><strong>包含4缩进或编程语言关键词的文本</strong> 自动解析代码块</p>
      <p><strong>任何Markdown</strong> 解析为对应样式</p>
    </div>
    <div class="chat-main">
      <div class="chat-header">聊天室</div>
      <div class="chat-messages" id="messages"></div>
      <button type="button" id="scrollToBottomBtn" class="scroll-to-bottom-btn" onclick="handleScrollToBottomClick()"
        aria-label="回到底部">
        ⬇ 回到底部
      </button>
      <div class="chat-input">
        <div class="mention-alert-bar" id="mentionAlertBar">
          <span class="mention-alert-text" id="mentionAlertText"></span>
          <button type="button" class="mention-close-btn" onclick="hideMentionAlert()">
            知道了
          </button>
        </div>
        <div class="reply-bar" id="replyBar">
          <span class="reply-text" id="replyText"></span>
          <button type="button" class="reply-cancel-btn" onclick="clearReplyContext()">
            取消
          </button>
        </div>
        <div class="chat-input-row">
          <textarea id="messageInput" placeholder="输入消息... (Shift+Enter换行,Enter发送)"></textarea>
          <button onclick="sendMessage()">发送</button>
        </div>
        <div class="mention-picker" id="mentionPicker"></div>

        <div class="chat-input-row">
          <input type="file" id="fileInput" />
          <button onclick="uploadFile()">上传文件</button>
        </div>
      </div>
    </div>
    <div class="file-list floating-panel" id="fileList">
      <h3>文件列表</h3>
    </div>
  </div>

  <script>
    let ws;
    let username;
    let lastInputValue = "";
    let shouldAutoFollow = true;
    let unreadCount = 0;
    let replyContext = null;
    let onlineUsers = [];
    let mentionSessionActive = false;
    let lastMentionTokenStart = -1;
    let historyReplayDone = false;
    let pendingJumpMsgId = null;
    let lastTipMsgId = "";
    let pendingSentMessages = [];
    let glightboxInstance = null;
    let lightboxInfoEl = null;
    const SYSTEM_PREFIX = "[SYSTEM]";
    const SYSTEM_ALERT_PREFIX = "[SYSTEM:ALERT]";

    function generateLocalMessageId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return `local-${window.crypto.randomUUID()}`;
      }
      return `local-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function formatReplyPreview(text, maxLength = 40) {
      const compact = stripReplyAndMsgMeta(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/```[\s\S]*?```/g, " [代码] ")
        .replace(/!\[[^\]]*\]\([^)]*\)/g, " [图片] ")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/https?:\/\/\S+/gi, "[链接]")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/^\s*>\s*/gm, "")
        .replace(/[\[\]()]/g, " ")
        .replace(/\s+/g, " ")
        .replace(/^\s+|\s+$/g, "");
      if (!compact) {
        return "[空消息]";
      }
      return compact;
    }

    function stripReplyAndMsgMeta(sourceText) {
      let source = (sourceText || "").toString().replace(/\r\n?/g, "\n");
      source = source
        .replace(/^\s*\[\[msg:[A-Za-z0-9_-]+\]\]\s*\n?/i, "")
        .replace(/^\s*\[\[reply:[^\]]*\]\]\s*\n?/i, "")
        .replace(/^\s*reply:[^\n]*\n?/i, "");
      return source.replace(/^\n+/, "");
    }

    function parseReplyTarget(rawMessage) {
      const source = (rawMessage || "").toString();
      const firstColon = source.indexOf("：");
      if (firstColon > 0) {
        return {
          sender: source.slice(0, firstColon),
          content: source.slice(firstColon + 1),
        };
      }
      return {
        sender: "消息",
        content: source,
      };
    }

    function parseMessageMeta(rawMessage) {
      const parsed = parseReplyTarget(rawMessage);
      const content = (parsed.content || "").replace(/\r\n?/g, "\n");
      const msgMatch = content.match(/^\s*\[\[msg:([A-Za-z0-9_-]+)\]\]\s*\n?/);
      const msgId = msgMatch ? msgMatch[1] : "";
      const contentWithoutMsg = msgMatch
        ? content.slice(msgMatch[0].length).replace(/^\n+/, "")
        : content;

      return {
        sender: parsed.sender,
        content,
        msgId,
        contentWithoutMsg,
      };
    }

    function buildMessageMarkdown(sender, content) {
      const safeSender = sender || "消息";
      const normalizedContent = (content || "").replace(/\r\n?/g, "\n");
      const firstLine = normalizedContent.split("\n")[0] || "";
      const secondLine = normalizedContent.split("\n")[1] || "";
      const needsBlockBreak =
        /^(\s*```|\s*~~~|\s{4,}\S)/.test(normalizedContent) ||
        /^\s{0,3}#{1,6}\s/.test(firstLine) ||
        /^\s{0,3}>\s?/.test(firstLine) ||
        /^\s{0,3}(?:[-+*]|\d+\.)\s/.test(firstLine) ||
        /^\s{0,3}(?:-{3,}|\*{3,}|_{3,})\s*$/.test(firstLine) ||
        /^\s*\|.*\|\s*$/.test(firstLine) ||
        (/^\s*[:\-| ]+\s*$/.test(secondLine) && firstLine.includes("|"));

      return needsBlockBreak
        ? `${safeSender}：\n${normalizedContent.replace(/^\n+/, "")}`
        : `${safeSender}：${normalizedContent}`;
    }

    function safeDecodeURIComponent(text) {
      try {
        return decodeURIComponent(text || "");
      } catch (e) {
        return (text || "").toString();
      }
    }

    function parseReplyMeta(content) {
      const normalized = (content || "").toString().replace(/\r\n?/g, "\n");

      const tokenMatch = normalized.match(/^\s*\[\[reply:([^|\]]*)\|([^|\]]*)(?:\|([^\]]*))?\]\]\s*\n?/i);
      if (tokenMatch) {
        const replyTo = safeDecodeURIComponent(tokenMatch[1]).trim();
        const preview = safeDecodeURIComponent(tokenMatch[2]).trim();
        const targetMsgId = safeDecodeURIComponent(tokenMatch[3] || "").trim();
        const body = normalized.slice(tokenMatch[0].length).replace(/^\n+/, "");
        return {
          hasMeta: true,
          replyTo: replyTo || "消息",
          preview,
          targetMsgId,
          body,
        };
      }

      const looseTokenMatch = normalized.match(/^\s*reply:([^|\n]*)\|([^|\n]*)(?:\|([^\n]*))?\s*\n?/i);
      if (looseTokenMatch) {
        const replyTo = safeDecodeURIComponent(looseTokenMatch[1]).trim();
        const preview = safeDecodeURIComponent(looseTokenMatch[2]).trim();
        const targetMsgId = safeDecodeURIComponent(looseTokenMatch[3] || "").trim();
        const body = normalized.slice(looseTokenMatch[0].length).replace(/^\n+/, "");
        return {
          hasMeta: true,
          replyTo: replyTo || "消息",
          preview,
          targetMsgId,
          body,
        };
      }

      const firstLine = normalized.split("\n")[0] || "";
      const legacyMatch = firstLine.match(/^\s*>\s*回复\s+(.+?)\s*[：:](.*)$/);
      if (legacyMatch) {
        const replyTo = (legacyMatch[1] || "").trim();
        const preview = (legacyMatch[2] || "").trim();
        const body = normalized
          .replace(/^\s*>\s*回复[^\n]*\n*/, "")
          .replace(/^\n+/, "");
        return {
          hasMeta: true,
          replyTo: replyTo || "消息",
          preview,
          targetMsgId: "",
          body,
        };
      }

      return {
        hasMeta: false,
        replyTo: "",
        preview: "",
        targetMsgId: "",
        body: normalized,
      };
    }

    function escapeRegExp(text) {
      return (text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function isMentioningCurrentUser(rawMessage) {
      if (!username) {
        return false;
      }
      const { sender, contentWithoutMsg } = parseMessageMeta(rawMessage);
      const content = contentWithoutMsg;
      if (!content || !sender || sender === "消息" || sender === username) {
        return false;
      }

      const replyMeta = parseReplyMeta(content);
      const normalizedContent = (replyMeta.hasMeta
        ? replyMeta.body
        : content
      ).replace(/\r\n?/g, "\n");

      const escapedUsername = escapeRegExp(username);
      const mentionPattern = new RegExp(
        `(^|[^a-zA-Z0-9_])@${escapedUsername}`,
      );
      return mentionPattern.test(normalizedContent);
    }

    function renderMentionTip(rawMessage) {
      const { sender, msgId } = parseMessageMeta(rawMessage);
      if (!sender || sender === "消息") {
        return;
      }
      const mentionAlertBar = document.getElementById("mentionAlertBar");
      const mentionAlertText = document.getElementById("mentionAlertText");
      if (!mentionAlertBar || !mentionAlertText) {
        return;
      }
      mentionAlertText.textContent = `${sender} @了你`;
      mentionAlertBar.classList.add("open");
      lastTipMsgId = msgId || "";
      mentionAlertBar.dataset.jumpMsgId = lastTipMsgId;
      mentionAlertBar.style.cursor = lastTipMsgId ? "pointer" : "default";
      sendNotification(`${sender} @了你`, getNotificationBody(rawMessage));
      renderMentionPicker();
      // var atUrl = `http://im.kndxhz.cn/at.html?name=${sender}` ;
      // window.open(atUrl,'newindow','height=300,width=300,top=0,left=0,toolbar=no,menubar=no,scrollbars=no,resizable=no,location=no,status=no');
      refreshChatLayoutAfterFloatingChange();
    }

    function isReplyingCurrentUser(rawMessage) {
      if (!username) {
        return false;
      }
      const { sender, contentWithoutMsg } = parseMessageMeta(rawMessage);
      const content = contentWithoutMsg;
      if (!content || !sender || sender === "消息" || sender === username) {
        return false;
      }

      const replyMeta = parseReplyMeta(content);
      if (replyMeta.hasMeta) {
        return replyMeta.replyTo === username;
      }

      return false;
    }

    function dispatchMentionReplyTips(rawMessage) {
      if (!historyReplayDone) {
        return "none";
      }
      if (isReplyingCurrentUser(rawMessage)) {
        renderReplyTip(rawMessage);
        return "reply";
      }
      if (isMentioningCurrentUser(rawMessage)) {
        renderMentionTip(rawMessage);
        return "mention";
      }
      return "none";
    }

    function escapeMarkdownText(text) {
      return (text || "").replace(/([\\`*_{}\[\]()#+\-.!|>])/g, "\\$1");
    }

    function renderReplyTip(rawMessage) {
      const { sender, msgId } = parseMessageMeta(rawMessage);
      if (!sender || sender === "消息") {
        return;
      }
      const mentionAlertBar = document.getElementById("mentionAlertBar");
      const mentionAlertText = document.getElementById("mentionAlertText");
      if (!mentionAlertBar || !mentionAlertText) {
        return;
      }
      mentionAlertText.textContent = `${sender} 回复了你`;
      mentionAlertBar.classList.add("open");
      lastTipMsgId = msgId || "";
      mentionAlertBar.dataset.jumpMsgId = lastTipMsgId;
      mentionAlertBar.style.cursor = lastTipMsgId ? "pointer" : "default";
      sendNotification(`${sender} 回复了你`, getNotificationBody(rawMessage));
      renderMentionPicker();
      // var replyUrl = `http://im.kndxhz.cn/reply.html?name=${sender}` ;
      // window.open(replyUrl,'newindow','height=300,width=300,top=0,left=0,toolbar=no,menubar=no,scrollbars=no,resizable=no,location=no,status=no');
      refreshChatLayoutAfterFloatingChange();
    }

    function getNotificationBody(rawMessage) {
      const { contentWithoutMsg } = parseMessageMeta(rawMessage);
      const replyMeta = parseReplyMeta(contentWithoutMsg || "");
      const body = replyMeta.hasMeta ? replyMeta.body : contentWithoutMsg;
      return (body || "").trim();
    }

    function sendNotification(title, message) {
      if (Notification.permission === "granted") {
        new Notification(title, {
          body: message,
        });
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then((permission) => {
          if (permission === "granted") {
            new Notification(title, {
              body: message,
            });
          }
        });
      }
    }

    function hideMentionAlert() {
      const mentionAlertBar = document.getElementById("mentionAlertBar");
      if (mentionAlertBar) {
        mentionAlertBar.classList.remove("open");
        mentionAlertBar.dataset.jumpMsgId = "";
        mentionAlertBar.style.cursor = "default";
      }
      renderMentionPicker();
      scheduleSyncMessageBottomSpacing();
    }

    function flashMessageElement(el) {
      if (!el) {
        return;
      }
      el.classList.add("message-jump-highlight");
      setTimeout(() => {
        el.classList.remove("message-jump-highlight");
      }, 2200);
    }

    async function jumpToMessageById(msgId, allowFetch = true) {
      if (!msgId) {
        return false;
      }

      const target = document.querySelector(
        `[data-msg-id="${msgId}"], [data-server-msg-id="${msgId}"]`,
      );
      if (target) {
        shouldAutoFollow = true;
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        flashMessageElement(target);
        return true;
      }

      if (!allowFetch) {
        return false;
      }

      try {
        const response = await fetch(`http://im.kndxhz.cn:5000/get_message_by_id/${encodeURIComponent(msgId)}`);
        if (!response.ok) {
          return false;
        }
        const data = await response.json();
        if (!data || !data.found || !data.message) {
          return false;
        }
        renderMessage(data.message, "received");
        return jumpToMessageById(msgId, false);
      } catch (error) {
        console.warn("跳转消息失败", error);
        return false;
      }
    }

    function hydratePendingSentMessage(rawMessage) {
      const parsedMessageMeta = parseMessageMeta(rawMessage);
      if (!parsedMessageMeta.sender || parsedMessageMeta.sender !== username) {
        return false;
      }

      const pendingIndex = pendingSentMessages.findIndex(
        (item) => item.content === parsedMessageMeta.contentWithoutMsg,
      );
      if (pendingIndex < 0) {
        return false;
      }

      const pendingItem = pendingSentMessages[pendingIndex];
      pendingSentMessages.splice(pendingIndex, 1);

      if (pendingItem.element) {
        if (parsedMessageMeta.msgId) {
          pendingItem.element.dataset.serverMsgId = parsedMessageMeta.msgId;
          pendingItem.element.id = `msg-${parsedMessageMeta.msgId}`;
          if (!pendingItem.element.dataset.msgId) {
            pendingItem.element.dataset.msgId = parsedMessageMeta.msgId;
          }
        }
        pendingItem.element.classList.remove("pending-sent-message");
        pendingItem.element.removeAttribute("data-pending-message");
      }

      return true;
    }

    async function applyJumpFromUrl() {
      if (!pendingJumpMsgId) {
        return;
      }
      const msgId = pendingJumpMsgId;
      const ok = await jumpToMessageById(msgId, true);
      if (ok) {
        pendingJumpMsgId = null;
      }
    }

    function isValidUsername(name) {
      if (!name || typeof name !== "string") {
        return false;
      }
      const validPattern = /^[a-zA-Z0-9_\u4e00-\u9fff]+$/;
      return validPattern.test(name);
    }

    async function fetchOnlineUsers() {
      try {
        const response = await fetch(
          "http://im.kndxhz.cn:5000/get_online_user",
        );
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        if (!Array.isArray(data.users)) {
          onlineUsers = [];
          return;
        }
        onlineUsers = data.users.filter((name) => typeof name === "string");
      } catch (error) {
        console.warn("在线用户列表获取失败", error);
        onlineUsers = [];
      }
    }

    function getMentionState() {
      const messageInput = document.getElementById("messageInput");
      if (!messageInput) {
        return null;
      }
      const caretIndex =
        messageInput.selectionStart ?? messageInput.value.length;
      const beforeCaret = messageInput.value.slice(0, caretIndex);
      const match = beforeCaret.match(/(^|[^a-zA-Z0-9_])@([^\s@]*)$/);
      if (!match) {
        return null;
      }
      const keyword = match[2] || "";
      const tokenStart =
        beforeCaret.length - match[0].length + match[1].length;
      return {
        keyword,
        tokenStart,
        caretIndex,
      };
    }

    async function renderMentionPicker() {
      const picker = document.getElementById("mentionPicker");
      const state = getMentionState();
      if (!picker || !state) {
        if (picker) {
          picker.classList.remove("open");
          picker.innerHTML = "";
        }
        mentionSessionActive = false;
        lastMentionTokenStart = -1;
        refreshChatLayoutAfterFloatingChange();
        return;
      }

      if (!mentionSessionActive || state.tokenStart !== lastMentionTokenStart) {
        await fetchOnlineUsers();
        mentionSessionActive = true;
        lastMentionTokenStart = state.tokenStart;
      }

      const keyword = state.keyword.toLowerCase();
      const candidates = onlineUsers
        .filter((name) => name && name !== username)
        .filter((name) => !keyword || name.toLowerCase().includes(keyword));

      if (!candidates.length) {
        picker.classList.remove("open");
        picker.innerHTML = "";
        refreshChatLayoutAfterFloatingChange();
        return;
      }

      picker.innerHTML = candidates
        .map(
          (name) =>
            `<button type="button" class="mention-option" data-name="${name.replace(/"/g, "&quot;")}">@${name}</button>`,
        )
        .join("");
      picker.classList.add("open");
      picker.scrollLeft = 0;
      refreshChatLayoutAfterFloatingChange();

      picker.querySelectorAll(".mention-option").forEach((button) => {
        button.addEventListener("click", () => {
          applyMention(button.dataset.name || "");
        });
      });
    }

    function applyMention(name) {
      const messageInput = document.getElementById("messageInput");
      const picker = document.getElementById("mentionPicker");
      const state = getMentionState();
      if (!messageInput || !state || !name) {
        return;
      }

      const before = messageInput.value.slice(0, state.tokenStart);
      const after = messageInput.value.slice(state.caretIndex);
      const mentionText = `@${name} `;
      messageInput.value = `${before}${mentionText}${after}`;
      const newCaret = (before + mentionText).length;
      messageInput.focus();
      messageInput.setSelectionRange(newCaret, newCaret);
      if (picker) {
        picker.classList.remove("open");
        picker.innerHTML = "";
      }
      refreshChatLayoutAfterFloatingChange();
    }

    function setReplyContextFromMessage(rawMessage, messageType, messageElement = null) {
      if (messageType === "system") {
        return;
      }
      const { sender, contentWithoutMsg, msgId } = parseMessageMeta(rawMessage);
      const parsedReplyMeta = parseReplyMeta(contentWithoutMsg || "");
      const previewSource = parsedReplyMeta.hasMeta
        ? parsedReplyMeta.body || parsedReplyMeta.preview || ""
        : contentWithoutMsg;
      const fallbackTargetMsgId = parsedReplyMeta.hasMeta
        ? parsedReplyMeta.targetMsgId || ""
        : "";
      const localMsgId = messageElement?.dataset?.msgId || "";
      const serverMsgId = messageElement?.dataset?.serverMsgId || msgId || "";
      replyContext = {
        sender: sender || "消息",
        preview: formatReplyPreview(previewSource),
        msgId: localMsgId || serverMsgId || fallbackTargetMsgId || "",
      };
      const replyBar = document.getElementById("replyBar");
      const replyText = document.getElementById("replyText");
      if (replyBar && replyText) {
        replyText.textContent = `回复 ${replyContext.sender}：${replyContext.preview}`;
        replyBar.classList.add("open");
      }

      const messageInput = document.getElementById("messageInput");
      if (messageInput) {
        messageInput.focus();
      }
      refreshChatLayoutAfterFloatingChange();
    }

    function clearReplyContext() {
      replyContext = null;
      const replyBar = document.getElementById("replyBar");
      if (replyBar) {
        replyBar.classList.remove("open");
      }
      refreshChatLayoutAfterFloatingChange();
    }

    function isNearBottom(element, threshold = 90) {
      if (!element) {
        return true;
      }
      const distanceToBottom =
        element.scrollHeight - element.scrollTop - element.clientHeight;
      return distanceToBottom <= threshold;
    }

    function updateScrollToBottomButton() {
      const btn = document.getElementById("scrollToBottomBtn");
      const messagesDiv = document.getElementById("messages");
      if (!btn || !messagesDiv) {
        return;
      }

      const shouldShow = !shouldAutoFollow && !isNearBottom(messagesDiv);
      btn.classList.toggle("visible", shouldShow);
      btn.textContent =
        unreadCount > 0 ? `⬇ ${unreadCount}条新消息` : "⬇ 回到底部";
    }

    function handleScrollToBottomClick() {
      shouldAutoFollow = true;
      unreadCount = 0;
      scrollMessagesToBottom(true);
      updateScrollToBottomButton();
    }

    function scrollMessagesToBottom(force = false) {
      const messagesDiv = document.getElementById("messages");
      if (!messagesDiv) {
        return;
      }
      if (force || shouldAutoFollow) {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        if (isNearBottom(messagesDiv)) {
          unreadCount = 0;
        }
      }
      updateScrollToBottomButton();
    }

    function autoResize(textarea) {
      textarea.style.height = "auto";
      const newHeight = Math.min(textarea.scrollHeight, 150);
      textarea.style.height = newHeight + "px";
      scheduleSyncMessageBottomSpacing();
    }

    function refreshChatLayoutAfterFloatingChange() {
      requestAnimationFrame(() => {
        syncMessageBottomSpacing();
        scrollMessagesToBottom();
        updateScrollToBottomButton();
        requestAnimationFrame(() => {
          syncMessageBottomSpacing();
          scrollMessagesToBottom();
          updateScrollToBottomButton();
        });
      });
    }

    function syncMessageBottomSpacing() {
      const messages = document.getElementById("messages");
      const chatInput = document.querySelector(".chat-input");
      if (!messages || !chatInput) {
        return;
      }

      const inputHeight = Math.ceil(
        chatInput.getBoundingClientRect().height || 0,
      );
      const safeGap = window.matchMedia("(max-width: 560px)").matches
        ? 28
        : 18;

      const currentPaddingTop =
        window.getComputedStyle(messages).paddingTop || "0px";

      messages.style.setProperty(
        "padding-top",
        currentPaddingTop,
        "important",
      );
      messages.style.setProperty(
        "padding-bottom",
        `${inputHeight + safeGap}px`,
        "important",
      );
    }

    function scheduleSyncMessageBottomSpacing() {
      requestAnimationFrame(() => {
        syncMessageBottomSpacing();
        requestAnimationFrame(() => {
          syncMessageBottomSpacing();
        });
      });
    }

    // 初始化输入框事件
    const messageInput = document.getElementById("messageInput");

    // 输入时自动调整高度
    messageInput.addEventListener("input", () => {
      autoResize(messageInput);
      renderMentionPicker();
    });

    messageInput.addEventListener("click", () => {
      renderMentionPicker();
    });

    window.addEventListener("resize", () => {
      scheduleSyncMessageBottomSpacing();
    });

    window.addEventListener("orientationchange", () => {
      scheduleSyncMessageBottomSpacing();
    });

    // 自定义图片渲染方法
    renderer.image = function (href, title, text) {
      const safeHref = (href || "").toString();
      const safeTitle = (title || "").toString();
      const safeText = (text || "").toString();
      return `
          <img src="${safeHref}" alt="${safeText}" title="${safeTitle}">
        `;
    };

    renderer.link = function (href, title, text) {
      let rawHref = href;
      let rawTitle = title;
      let rawText = text;

      if (href && typeof href === "object") {
        rawHref = href.href || "";
        rawTitle = href.title || "";
        rawText = href.text || href.raw || text || "";
      }

      rawHref = (rawHref || "").toString().trim();
      const safeText = rawText || rawHref || "链接";
      if (!rawHref) {
        return safeText;
      }
      let safeHref = "";
      try {
        const url = new URL(rawHref, window.location.origin);
        if (!/^(https?:|mailto:|tel:)$/i.test(url.protocol)) {
          return safeText;
        }
        safeHref = url.href;
      } catch (e) {
        return safeText;
      }
      const escapedHref = String(safeHref)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;");
      const safeTitle = rawTitle
        ? ` title="${String(rawTitle)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")}"`
        : "";
      return `<a href="${escapedHref}" target="_blank" rel="noopener noreferrer nofollow"${safeTitle}>${safeText}</a>`;
    };

    // 设置其他自定义渲染方法（如代码块）
    renderer.code = function (code, infostring) {
      const lang = (infostring || "").match(/\S*/)[0];
      const safeCode = String(code || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      return `
                <div class="code-block-wrapper">
                    <pre><code class="hljs ${lang ? `language-${lang}` : ""}">${safeCode}</code></pre>
                </div>
            `;
    };

    // 设置 cookie
    function setCookie(name, value, days) {
      const date = new Date();
      date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
      const cookieString = `${name}=${encodeURIComponent(value)};expires=${date.toUTCString()};path=/`;
      console.log("设置cookie:", cookieString); // 调试日志
      document.cookie = cookieString;
      if (name === "username") {
        localStorage.setItem("username", value);
      }
    }

    // 获取 cookie
    function getCookie(name) {
      const cookies = document.cookie.split("; ");
      for (let cookie of cookies) {
        const [key, value] = cookie.split("=");
        if (key === name) {
          return decodeURIComponent(value || "");
        }
      }
      if (name === "username") {
        const storedUsername = localStorage.getItem("username");
        if (storedUsername) {
          return storedUsername;
        }
      }
      return null;
    }

    // 删除 cookie
    function deleteCookie(name) {
      document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
      if (name === "username") {
        localStorage.removeItem("username");
      }
    }

          // 检查是否是代码格式（以4个空格开头或包含特定关键字）
          let check_message = message.toLowerCase();
          let keywords = [
            "if",
            "for",
            "while",
            "def",
            "class",
            "return",
            "print",
            "import",
            "sqlite3",
            "tkinter",
            "select",
          ];
          if (
            /^ {4}|(\n {4})/m.test(check_message) ||
            keywords.some((keyword) => check_message.includes(keyword))
          ) {
            formattedMessage = "```\n" + message + "\n```";
          }
        }

        // 检查是否是 "/set-name xxx" 指令
        if (message.startsWith("/set-name ")) {
          const newUsername = message.substring(10);

        } else if (message !== "/clear") {

          let messageWithUsername = `${formattedMessage}`;
          if (replyContext) {
            const replySender = encodeURIComponent(replyContext.sender || "消息");
            const replyPreview = encodeURIComponent(replyContext.preview || "");
            const replyMsgId = encodeURIComponent(replyContext.msgId || "");
            const replyMetaToken = `[[reply:${replySender}|${replyPreview}|${replyMsgId}]]`;
            messageWithUsername = `${replyMetaToken}\n${formattedMessage}`;

    function renderMessage(message, type, originalMessage = "", options = {}) {
      const messagesDiv = document.getElementById("messages");

      originalMessage = (originalMessage || "").toString();
      container.className = "message-container";

      if (
        type === "received" &&
        username &&
        message.startsWith(`${username}：`)
      ) {
        type = "sent";
      }

      const shouldStickToBottom =
        type !== "received" || shouldAutoFollow || isNearBottom(messagesDiv);

      // 预处理消息内容（添加安全过滤）
      const normalizedMessage = (message || "").replace(/\r\n?/g, "\n");

      const parsedMessageMeta = parseMessageMeta(normalizedMessage);
      const serverMsgId = parsedMessageMeta.msgId || "";
      const localMsgId = options.pending ? generateLocalMessageId() : "";
      const currentMsgId = serverMsgId || localMsgId;

      let replyHeaderText = "";
      let replyTargetMsgId = "";
      let messageForMarkdown =
        parsedMessageMeta.sender === "消息"
          ? normalizedMessage
          : buildMessageMarkdown(
            parsedMessageMeta.sender,
            parsedMessageMeta.contentWithoutMsg,
          );
      const parsedTarget = parseReplyTarget(
        parsedMessageMeta.sender === "消息"
          ? normalizedMessage
          : buildMessageMarkdown(
            parsedMessageMeta.sender,
            parsedMessageMeta.contentWithoutMsg,
          ),
      );
      if (parsedTarget.sender !== "消息") {
        const replyMeta = parseReplyMeta(parsedTarget.content || "");
        if (replyMeta.hasMeta) {
          const headerPreview = replyMeta.preview || "[空消息]";
          replyHeaderText = `回复 ${replyMeta.replyTo}：${headerPreview}`;
          replyTargetMsgId = replyMeta.targetMsgId || "";
          messageForMarkdown = buildMessageMarkdown(
            parsedTarget.sender,
            replyMeta.body || "",
          );
        }
      }

      const messageElement = document.createElement("div");
      messageElement.className = "message-content";
      if (currentMsgId) {
        messageElement.dataset.msgId = currentMsgId;
        messageElement.id = `msg-${currentMsgId}`;
      }
      if (serverMsgId) {
        messageElement.dataset.serverMsgId = serverMsgId;
      }
      if (options.pending) {
        messageElement.dataset.pendingMessage = "true";
        messageElement.classList.add("pending-sent-message");
      }

      marked.setOptions({
        breaks: true,
        langPrefix: "hljs language-",
        renderer,
      });

      try {
        // 先解析Markdown，再做HTML安全过滤，避免链接/回复被错误截断
        const parsedHtml = marked.parse(messageForMarkdown);
        const sanitizedHtml = DOMPurify.sanitize(parsedHtml, {
          ADD_ATTR: ["target", "rel", "data-title", "data-gallery"],
        });
        messageElement.innerHTML = sanitizedHtml;

        messageElement.querySelectorAll("a").forEach((link) => {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer nofollow");
        });

        const renderedText = (messageElement.textContent || "").trim();
        const sourceText = (messageForMarkdown || "").trim();
        if (!renderedText && sourceText) {
          messageElement.textContent = messageForMarkdown;
        }
      } catch (e) {
        console.error("Markdown解析错误:", e);
        messageElement.textContent = messageForMarkdown;
      }

      if (replyHeaderText) {
        const replyHeader = document.createElement("div");
        replyHeader.className = "reply-meta-line";
        replyHeader.textContent = replyHeaderText;
        if (replyTargetMsgId) {
          replyHeader.dataset.targetMsgId = replyTargetMsgId;
          replyHeader.style.cursor = "pointer";
          replyHeader.title = "点击跳转到被回复消息";
          replyHeader.addEventListener("click", async () => {
            await jumpToMessageById(replyTargetMsgId, true);
          });
        }
        messageElement.prepend(replyHeader);
      }

      // 添加代码块功能（容错：任意高亮失败不影响消息主体展示）
      try {
        messageElement.querySelectorAll("pre code").forEach((block) => {
          try {
            hljs.highlightElement(block);
          } catch (e) {
            console.warn("代码高亮失败，已降级显示原文", e);
          }
          const pre = block.parentElement;
          if (!pre) {
            return;
          }
          pre.style.position = "relative";
          if (pre.querySelector(".copy-button")) {
            return;
          }

          const copyButton = document.createElement("button");
          copyButton.className = "copy-button";
          copyButton.innerHTML = "📋";
          copyButton.onclick = () => {
            try {
              navigator.clipboard.writeText(block.textContent).then(() => {
                copyButton.innerHTML = "✓";
                setTimeout(() => (copyButton.innerHTML = "📋"), 1500);
              });
            } catch (e) {
              const textArea = document.createElement("textarea");
              textArea.value = block.textContent;
              // 使text area不在viewport，同时设置不可见
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              document.execCommand("copy");
              textArea.remove();

              copyButton.innerHTML = "✓";
              setTimeout(() => (copyButton.innerHTML = "📋"), 1500);
            }
          };
          pre.appendChild(copyButton);
        });
      } catch (e) {
        console.error("消息后处理失败，但消息主体已保留显示", e);
      }

      // 样式设置
      messageElement.classList.add(type);
      messageElement.style.background =
        type === "sent"
          ? "rgba(0, 123, 255, 0.1)"
          : type === "system"
            ? "rgba(255, 193, 7, 0.14)"
            : "rgba(255, 255, 255, 0.5)";
      if (type !== "system") {
        messageElement.title = "右键回复此消息";
        messageElement.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          setReplyContextFromMessage(rawMessageForReply, type, messageElement);
        });
      }
      if (type === "system") {
        messageElement.style.borderLeft = "3px solid #f59e0b";
      }
      container.appendChild(messageElement);
      messagesDiv.appendChild(container);

      initLightbox();

      if (options.pending) {
        pendingSentMessages.push({
          content: parsedMessageMeta.contentWithoutMsg,
          element: messageElement,
        });
      }

      scheduleSyncMessageBottomSpacing();
      if (shouldStickToBottom) {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        unreadCount = 0;
      } else if (type === "received") {
        unreadCount += 1;
      }
      updateScrollToBottomButton();
    }

    function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      if (!file) {
        alert("请选择一个文件！");
        return;
      }
      uploadDroppedFile(file);
    }

    function uploadDroppedFile(file) {
      if (!file) {
        alert("未检测到文件！");
        return;
      }

      let name = file.name.replace(/ /g, "");
      let file_extensions = name.slice(-3).toLowerCase(); // 转为小写统一判断

      if (file.name === "image.png") {
        let time = Date.now();
        let newName = `${time}.${file_extensions}`;

        // 创建新的 File 对象
        file = new File([file], newName, { type: file.type });
        name = newName;
      }

      const formData = new FormData();
      formData.append("file", file);

      fetch(
        `http://im.kndxhz.cn:5000/upload?is_img=${file_extensions === "jpg" || file_extensions === "png" || file_extensions === "gif" ? 1 : 0}`,
        {
          method: "POST",
          body: formData,
        },
      )
        .then((response) => response.json())
        .then((data) => {
          if (
            file_extensions === "jpg" ||
            file_extensions === "png" ||
            file_extensions === "gif"
          ) {
            let downloadUrl = `http://im.kndxhz.cn/img/${name}`;
            let message = `![img](${downloadUrl})`;
            ws.send(message);
            renderMessage(`${username}：${message}`, "sent", `${username}：${message}`, {
              pending: true,
            });
          } else {
            let downloadUrl = `http://im.kndxhz.cn:5000/download/${name}`;
            let message = `发送了文件 ([${name}](${downloadUrl}))`;
            ws.send(message);
            renderMessage(`${username}：${message}`, "sent", `${username}：${message}`, {
              pending: true,
            });
          }

          alert(data.message || "文件上传成功！");
          fetchFileList(); // 更新文件列表
        })
        .catch((error) => {
          console.error("文件上传失败：", error);
          alert("文件上传失败！");
        });
    }

    function fetchFileList() {
      fetch("http://im.kndxhz.cn:5000/file_list")
        .then((response) => response.json()) // 解析为 JSON
        .then((files) => {
          const fileListDiv = document.getElementById("fileList");
          fileListDiv.innerHTML = "<h3>文件列表</h3>";
          files.forEach((file) => {
            const fileLink = document.createElement("a");
            fileLink.href = `http://im.kndxhz.cn:5000/download/${file}`;
            fileLink.textContent = file;
            fileLink.target = "_blank";
            fileListDiv.appendChild(fileLink);
          });
        })
        .catch((error) => {
          console.error("获取文件列表失败：", error);
        });
    }
  </script>
</body>
